<!-- Google form submition -->
<script>
  document
    .getElementById("appointmentForm")
    .addEventListener("submit", function (e) {
      e.preventDefault(); // Stop normal form submit

      const scriptURL =
        "https://script.google.com/macros/s/AKfycbxEi1Rom7NEGKlLxxxxxxxx8-uv01ic923yA/exec";
      const form = document.getElementById("appointmentForm");
      const submitBtn = document.getElementById("submitBtn");
      const formData = new FormData(form);

      // Disable button
      submitBtn.disabled = true;
      submitBtn.innerHTML = "Booking...";

      fetch(scriptURL, {
        method: "POST",
        body: formData,
      })
        .then((response) => response.text())
        .then((data) => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Book Now";
          alert("Appointment Booked Successfully!");
          form.reset();
        })
        .catch((error) => {
          alert("Error submitting form");
          console.error("Error!", error.message);
        });
    });
</script>

<!-- form hospital input -->
<script>
  function updateTimings() {
    const hospital = document.getElementById("InputHospital").value;
    const timeSelect = document.getElementById("InputTime");

    // Clear previous options
    timeSelect.innerHTML = '<option value="">Select Time</option>';

    if (hospital === "Rama Hospital - Noida Sector 61") {
      // 9:00 AM to 4:00 PM (30-minute intervals)
      addTimeRange(timeSelect, 9, 16);
    } else if (hospital === "Dr. Kanika Roy’s Clinic Noida Sec - 30") {
      // 9:00 AM to 8:00 PM (30-minute intervals)
      addTimeRange(timeSelect, 9, 20);
    }
  }

  // Generate time slots in 30-minute intervals
  function addTimeRange(selectElement, startHour, endHour) {
    for (let hour = startHour; hour <= endHour; hour++) {
      addTimeOption(selectElement, formatTime(hour, 0));
      if (hour !== endHour) addTimeOption(selectElement, formatTime(hour, 30));
    }
  }

  // Format time for option
  function formatTime(hour24, minute) {
    const value = `${hour24.toString().padStart(2, "0")}:${minute === 0 ? "00" : "30"}`;
    let hour12 = hour24 % 12 || 12;
    const suffix = hour24 < 12 ? "AM" : "PM";
    const label = `${hour12}:${minute === 0 ? "00" : "30"} ${suffix}`;
    return [value, label];
  }

  function addTimeOption(selectElement, [value, label]) {
    const option = document.createElement("option");
    option.value = value;
    option.text = label;
    selectElement.add(option);
  }
</script>

<!-- App Script -->
<script>
  function doPost(e) {
    var sheet =
      SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Appointments");

    var data = [
      e.parameter.name || "",
      e.parameter.email || "",
      e.parameter.phone || "",
      e.parameter.service || "",
      e.parameter.hospital || "",
      e.parameter.time || "",
      e.parameter.date || "",
      e.parameter.comment || "",
      new Date(),
    ];

    sheet.appendRow(data);

    return ContentService.createTextOutput(
      JSON.stringify({ result: "success" }),
    ).setMimeType(ContentService.MimeType.JSON);
  }
</script>
